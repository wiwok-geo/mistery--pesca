<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mistery: Pesca Extrema</title>
    <style>
        body { text-align: center; font-family: 'Courier New', Courier, monospace; background: #001f3f; margin: 0; overflow: hidden; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #0074D9 0%, #001f3f 100%); cursor: crosshair; }
        .fish { 
            position: absolute; 
            font-size: 25px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            user-select: none;
            z-index: 5;
        }
        #ui { position: absolute; top: 10px; width: 100%; pointer-events: none; }
        #message { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(255, 255, 255, 0.95); color: #333; padding: 30px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0,255,255,0.5); z-index: 20; border: 4px solid #0074D9; width: 80%;
        }
        .coordinates { font-size: 1.4em; color: #d32f2f; font-weight: bold; background: #eee; padding: 15px; border-radius: 10px; border: 2px dashed #333; }
        button { background: #0074D9; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <h1>DESAFÍO: PESCA 10 PECES</h1>
        <div id="counter">Peces en el cubo: 0 / 10</div>
    </div>
    
    <div id="message">
        <h2>¡MAESTRO PESCADOR! 🏆</h2>
        <p>Has demostrado gran habilidad. Aquí tienes las coordenadas finales:</p>
        <p class="coordinates">N 041° 30.697' E 002° 08.693'</p>
        <p><small>¡Anota las coordenadas antes de cerrar!</small></p>
        <button onclick="location.reload()">Volver a intentar</button>
    </div>
</div>

<script>
    let caught = 0;
    const totalFish = 10; 
    const container = document.getElementById('game-container');
    const message = document.getElementById('message');
    const counter = document.getElementById('counter');

    function createFish() {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = '🐟';
        
        updatePosition(fish);
        
        // El pez intenta huir si te acercas mucho (simulado con mouseover)
        fish.onmouseover = () => {
            if(Math.random() > 0.4) updatePosition(fish); 
        };

        fish.onclick = (e) => {
            e.stopPropagation();
            caught++;
            counter.innerText = `Peces en el cubo: ${caught} / ${totalFish}`;
            
            fish.innerHTML = '✨';
            setTimeout(() => fish.remove(), 100);

            if (caught < totalFish) {
                createFish();
            } else {
                message.style.display = 'block';
            }
        };

        // Movimiento automático rápido
        const movementInterval = setInterval(() => {
            if(document.body.contains(fish)) {
                updatePosition(fish);
            } else {
                clearInterval(movementInterval);
            }
        }, 700); 

        container.appendChild(fish);
    }

    function updatePosition(el) {
        const x = Math.random() * 80;
        const y = Math.random() * 80 + 10;
        el.style.left = x + 'vw';
        el.style.top = y + 'vh';
        el.style.transform = Math.random() > 0.5 ? 'scaleX(1)' : 'scaleX(-1)';
    }

    // Empezar con dos peces a la vez para más acción
    createFish();
    setTimeout(createFish, 400);

</script>

</body>
</html>
