<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistery: El Estanque del Tesoro</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #e0f7fa; margin: 0; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #4fc3f7; cursor: crosshair; }
        .fish { position: absolute; font-size: 40px; cursor: pointer; transition: all 0.5s ease; user-select: none; }
        #message { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                   background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 10; }
        h1 { color: #01579b; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>¡Atrapa 3 peces para ver las coordenadas!</h1>
    <div id="counter">Peces atrapados: 0</div>
    
    <div id="message">
        <h2>¡Buena pesca! 🎣</h2>
        <p>Aquí tienes el tesoro:</p>
        <p><strong>N 41° 30.640 E 002° 08.693</strong></p>
        <button onclick="location.reload()">Reiniciar</button>
    </div>
</div>

<script>
    let caught = 0;
    const totalFish = 3;
    const container = document.getElementById('game-container');
    const message = document.getElementById('message');
    const counter = document.getElementById('counter');

    function createFish() {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = '🐟';
        fish.style.left = Math.random() * 80 + 'vw';
        fish.style.top = Math.random() * 80 + 'vh';
        
        fish.onclick = () => {
            caught++;
            counter.innerText = `Peces atrapados: ${caught}`;
            fish.remove();
            if (caught < totalFish) {
                createFish();
            } else {
                message.style.display = 'block';
            }
        };

        // Movimiento errático
        setInterval(() => {
            fish.style.left = Math.random() * 80 + 'vw';
            fish.style.top = Math.random() * 80 + 'vh';
        }, 1500);

        container.appendChild(fish);
    }

    // Iniciar el primer pez
    createFish();
</script>

</body>
</html>
